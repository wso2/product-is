name: Port master PRs to next

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:

jobs:
  scan-merged-prs:
    runs-on: codebuild-wso2_product-is-${{ github.run_id }}-${{ github.run_attempt }}
    outputs:
      prs: ${{ steps.collect.outputs.prs }}
      has_prs: ${{ steps.collect.outputs.has_prs }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install jq -y

      - name: Determine scan window
        id: window
        run: |
          SINCE=$(date -u -d "30 minutes ago" +"%Y-%m-%dT%H:%M:%SZ")
          echo "since=$SINCE" >> $GITHUB_OUTPUT

      - name: Search merged PRs in org
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ORG="wso2"
          SINCE="${{ steps.window.outputs.since }}"

          echo "Searching PRs merged after $SINCE"

          curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/search/issues?q=org:$ORG+is:pr+is:merged+merged:>=$SINCE&per_page=100" \
            > prs.json

          cat prs.json | jq '.items | length'

      - name: Collect PRs into JSON array
        id: collect
        run: |
          PR_ARRAY=$(jq -c '[.items[] | {
            pr_number: (.number | tostring),
            repo_name: (.repository_url | sub("https://api.github.com/repos/"; ""))
          }]' prs.json)
          COUNT=$(echo "$PR_ARRAY" | jq 'length')
          echo "Collected $COUNT PRs to sync"
          echo "prs=$PR_ARRAY" >> $GITHUB_OUTPUT
          if [ "$COUNT" -gt 0 ]; then
            echo "has_prs=true" >> $GITHUB_OUTPUT
          else
            echo "has_prs=false" >> $GITHUB_OUTPUT
          fi

  sync-prs:
    needs: scan-merged-prs
    if: needs.scan-merged-prs.outputs.has_prs == 'true'
    uses: ./.github/workflows/sync-prs-to-next.yml
    with:
      prs: ${{ needs.scan-merged-prs.outputs.prs }}
    secrets:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}