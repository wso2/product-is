# This workflow syncs PRs from the master branch to the next branch.
# It is a reusable workflow (workflow_call) that accepts a JSON array of PRs.
# Input format:  [{"pr_number": "42", "repo_name": "wso2/identity-apps"}, ...]

name: 🔄 Sync PRs to next

on:
  workflow_call:
    inputs:
      prs:
        description: 'JSON array of PRs to sync, e.g. [{"pr_number":"42","repo_name":"wso2/identity-apps"}]'
        required: true
        type: string
    secrets:
      GH_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      prs:
        description: 'JSON array of PRs to sync, e.g. [{"pr_number":"42","repo_name":"wso2/identity-apps"}]'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

env:
  BASE_BRANCH: master
  TARGET_BRANCH: next
  GH_TOKEN: ${{ secrets.GH_TOKEN }}
  # Skip conditions for PRs (comma-separated arrays)
  SKIP_AUTHORS: ""
  SKIP_TITLE_PATTERNS: "[skip ci]"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Set up Git
        run: |
          git config user.name "wso2-iam-bot"
          git config user.email "wso2-iam-bot@users.noreply.github.com"

      - name: Sync each PR to next
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          INPUT_PRS: ${{ inputs.prs }}
        run: |
          echo "$INPUT_PRS" | jq -c '.[]' | while read -r entry; do
            PR_NUMBER=$(echo "$entry" | jq -r '.pr_number')
            REPO_NAME=$(echo "$entry"  | jq -r '.repo_name')

            echo "======================================"
            echo "Processing PR #$PR_NUMBER in $REPO_NAME"
            echo "======================================"

            # ── Verify the PR is merged ───────────────────────────────────
            PR_STATE=$(gh pr view "$PR_NUMBER" --repo "$REPO_NAME" --json state -q '.state')
            if [[ "$PR_STATE" != "MERGED" ]]; then
              echo "WARNING: PR #$PR_NUMBER is not merged (state: $PR_STATE). Skipping."
              continue
            fi

            PR_TITLE=$(gh pr view "$PR_NUMBER" --repo "$REPO_NAME" --json title  -q '.title')
            PR_AUTHOR=$(gh pr view "$PR_NUMBER" --repo "$REPO_NAME" --json author -q '.author.login')

            # ── Skip conditions ───────────────────────────────────────────
            SKIP_AUTHORS_VAL="${{ env.SKIP_AUTHORS }}"
            SKIP_TITLE_PATTERNS_VAL="${{ env.SKIP_TITLE_PATTERNS }}"
            IFS=',' read -ra AUTHORS_ARRAY       <<< "$SKIP_AUTHORS_VAL"
            IFS=',' read -ra TITLE_PATTERNS_ARRAY <<< "$SKIP_TITLE_PATTERNS_VAL"

            SKIP_TITLE=false
            for pattern in "${TITLE_PATTERNS_ARRAY[@]}"; do
              if [[ "$PR_TITLE" == *"$pattern"* ]]; then
                SKIP_TITLE=true; break
              fi
            done

            SHOULD_SKIP=false
            if [[ -n "$SKIP_AUTHORS_VAL" ]]; then
              SKIP_AUTHOR=false
              for author in "${AUTHORS_ARRAY[@]}"; do
                if [[ "$PR_AUTHOR" == "$author" ]]; then
                  SKIP_AUTHOR=true; break
                fi
              done
              [[ "$SKIP_AUTHOR" == "true" && "$SKIP_TITLE" == "true" ]] && SHOULD_SKIP=true
            else
              [[ "$SKIP_TITLE" == "true" ]] && SHOULD_SKIP=true
            fi

            if [[ "$SHOULD_SKIP" == "true" ]]; then
              echo "Skipping PR #$PR_NUMBER ($PR_AUTHOR): $PR_TITLE"
              continue
            fi

            # ── Clone target repo into a temp directory ───────────────────
            WORK_DIR=$(mktemp -d)
            git clone --filter=blob:none \
              "https://x-access-token:${GH_TOKEN}@github.com/${REPO_NAME}.git" \
              "$WORK_DIR"
            pushd "$WORK_DIR" > /dev/null
            git config user.name  "wso2-iam-bot"
            git config user.email "wso2-iam-bot@users.noreply.github.com"
            git fetch origin "$TARGET_BRANCH"

            # ── Create sync branch off target ─────────────────────────────
            SYNC_BRANCH="sync-pr-${PR_NUMBER}-to-next"
            git checkout "$TARGET_BRANCH"
            git checkout -b "$SYNC_BRANCH"

            # ── Cherry-pick commits from the PR ───────────────────────────
            COMMITS=$(gh pr view "$PR_NUMBER" --repo "$REPO_NAME" \
              --json commits -q '.commits[].oid' | tr '\n' ' ')

            if [[ -z "$COMMITS" ]]; then
              echo "WARNING: No commits found for PR #$PR_NUMBER. Skipping."
              popd > /dev/null; rm -rf "$WORK_DIR"
              continue
            fi

            CHERRY_PICK_WARNED=false
            for commit in $COMMITS; do
              [[ -z "$commit" ]] && continue
              echo "Cherry-picking $commit"
              git cherry-pick "$commit" || {
                echo "Cherry-pick failed for $commit — skipping commit."
                git cherry-pick --skip
                CHERRY_PICK_WARNED=true
              }
            done

            COMMITS_ON_BRANCH=$(git log "${TARGET_BRANCH}..HEAD" --oneline 2>/dev/null || true)
            if [[ -z "$COMMITS_ON_BRANCH" ]]; then
              echo "No new commits to sync for PR #$PR_NUMBER. Target branch already up to date."
              popd > /dev/null; rm -rf "$WORK_DIR"
              continue
            fi

            # ── Push sync branch ──────────────────────────────────────────
            git push origin "$SYNC_BRANCH" --force || {
              echo "Failed to push sync branch to remote"
              popd > /dev/null; rm -rf "$WORK_DIR"
              continue
            }

            TOTAL_COMMITS=$(echo "$COMMITS_ON_BRANCH" | wc -l | tr -d ' ')

            # ── Build sync PR body ────────────────────────────────────────
            CONFLICT_NOTE=""
            if [[ "$CHERRY_PICK_WARNED" == "true" ]]; then
              CONFLICT_NOTE=$'\n''⚠️ **One or more cherry-picks were skipped due to conflicts.**'
            fi

            SYNC_TITLE="[Sync][${{ env.BASE_BRANCH }} -> ${{ env.TARGET_BRANCH }}][#${PR_NUMBER}]: $PR_TITLE"
            PR_BODY="🤖 **Auto-sync from \`${{ env.BASE_BRANCH }}\`**

          This PR syncs [#${PR_NUMBER}](https://github.com/${REPO_NAME}/pull/${PR_NUMBER}) to \`${{ env.TARGET_BRANCH }}\`.

          **Repository:** \`${REPO_NAME}\`
          **Author:** @${PR_AUTHOR}
          **Total commits synced:** ${TOTAL_COMMITS}${CONFLICT_NOTE}
          **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          **Commits:**
          \`\`\`
          $(git log "${{ env.TARGET_BRANCH }}..HEAD" --oneline)
          \`\`\`"

            # ── Create or update porting PR ───────────────────────────────
            EXISTING_PR=$(gh pr list \
              --repo  "$REPO_NAME" \
              --base  "${{ env.TARGET_BRANCH }}" \
              --head  "$SYNC_BRANCH" \
              --state open \
              --json  number \
              -q      '.[0].number')

            if [[ -n "$EXISTING_PR" ]]; then
              echo "Updating existing sync PR #$EXISTING_PR"
              gh pr edit "$EXISTING_PR" \
                --repo  "$REPO_NAME" \
                --title "$SYNC_TITLE" \
                --body  "$PR_BODY" || echo "WARNING: Failed to update PR, continuing."
            else
              NEW_PR=$(gh pr create \
                --repo  "$REPO_NAME" \
                --base  "${{ env.TARGET_BRANCH }}" \
                --head  "$SYNC_BRANCH" \
                --title "$SYNC_TITLE" \
                --body  "$PR_BODY") || {
                echo "❌ Failed to create PR for #$PR_NUMBER"
                popd > /dev/null; rm -rf "$WORK_DIR"
                continue
              }
              echo "✅ Created sync PR: $NEW_PR"
            fi

            popd > /dev/null
            rm -rf "$WORK_DIR"
          done

      - name: Summary
        if: always()
        run: |
          echo "Sync PRs to next step completed."
